{% set name = "smesh" %}
{% set version = "9.9.0.0" %}
{% set build_number = 20 %}
{% set build_number = build_number + 500 %}  # [FEATURE_DEBUG]

package:
  name: {{ name }}
  version: {{ version }}

source:
    fn: {{ name }}_{{ version }}.tar.gz
    url: https://github.com/looooo/SMESH/releases/download/vtk9.6.0_occt7.9.3/SMESH_.tar.gz
    sha256: 95f60b67f4fbb94fddfb6aee1b3d8c17ccc0e56c0678ed4967f47b517ac297cf
    patches:
      - patches/0002-test-pthread.patch

build:
  number: {{ build_number }}
  run_exports:
    - {{ pin_subpackage('smesh', max_pin='x.x.x') }}

requirements:
  build:
    - {{ compiler('cxx') }}
    - {{ compiler('c') }}
    - {{ stdlib("c") }}
    - ninja
    - cmake
  host:
    - libgl-devel                    # [linux]
    - libegl-devel                   # [linux]
    - libgles-devel                  # [linux]
    - libglx-devel                   # [linux]
    - libopengl-devel                # [linux]
    - vtk
    - vtk-io-ffmpeg  # [not win]
    - occt
    - libboost-devel
    - zlib
    - winpthreads-devel  # [win]
    - tbb-devel
    - libgl-devel                    # [linux]
    - xorg-libxi                     # [linux]
    - xorg-libxext                   # [linux]

test:
  source_files:
    - test
  requires:
    - {{ compiler('cxx') }}
    - {{ compiler('c') }}
    - libgl-devel                     # [linux]
    - xorg-libxi                      # [linux]
    - libegl-devel                    # [linux]
    - cmake
    - ninja
    - catch2 <3.0
    - zlib
    - libboost-devel
    - winpthreads-devel  # [win]
    - tbb-devel

about:
  home: https://github.com/LaughlinResearch/SMESH
  license: LGPL-2.1-or-later
  license_family: LGPL
  license_file: LICENSE.txt
  summary: A complete MESH framework based on the OCCT library.
  description: Standalone version of the meshing library from the Salome Platform.

extra:
  recipe-maintainers:
    - oursland
    - adrianinsaval
    - looooo
